openapi: 3.0.0
info:
  title: Store Catalog API
  version: '1.0.0'
  description: Public read-only API for browsing the store catalog
paths:
  '/store/catalog':
    get:
      operationId: getStoreCatalog
      summary: Get active products for catalog display
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Optional category filter
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
          description: Page number for pagination
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Number of items per page
      responses:
        '200':
          description: List of active catalog items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetCatalogItemResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/store/catalog/{storeProductId}':
    get:
      operationId: getCatalogItemById
      summary: Get a single product from the catalog
      parameters:
        - name: storeProductId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID of the store product to retrieve
      responses:
        '200':
          description: Catalog item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCatalogItemResponse'
        '404':
          description: Catalog item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    GetCatalogItemResponse:
      type: object
      properties:
        storeProductId:
          type: integer
          format: int64
          description: Store product ID
        name:
          type: string
          description: Display name of the product
        description:
          type: string
          nullable: true
          description: Detailed description of the product
        price:
          type: number
          format: double
          description: Current selling price
        imageUrl:
          type: string
          nullable: true
          description: Product image URL
        category:
          type: string
          nullable: true
          description: Product category
        inStock:
          type: boolean
          description: Whether the product is currently in stock
      required:
        - storeProductId
        - name
        - price
        - inStock
    ErrorResponse:
      type: object
