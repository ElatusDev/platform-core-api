openapi: 3.0.0
info:
  title: Store Transaction Entity
  version: '1.0.0'
  description: API for store transactions
paths:
  '/store-transactions':
    post:
      operationId: createStoreTransaction
      summary: Create a new store transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTransactionCreationRequest'
      responses:
        '201':
          description: Store transaction created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoreTransactionCreationResponse'
        '400':
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: getStoreTransactions
      summary: Get all store transactions
      responses:
        '200':
          description: List of store transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetStoreTransactionResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  '/store-transactions/{storeTransactionId}':
    get:
      operationId: getStoreTransactionById
      summary: Get a store transaction by ID
      parameters:
        - name: storeTransactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID of the store transaction to retrieve
      responses:
        '200':
          description: Store transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStoreTransactionResponse'
        '404':
          description: Store transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteStoreTransaction
      summary: Delete a store transaction
      parameters:
        - name: storeTransactionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: ID of the store transaction to delete
      responses:
        '204':
          description: Store transaction deleted successfully
        '404':
          description: Store transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deletion conflicts with current resource state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    BaseStoreTransaction:
      type: object
      properties:
        transactionType:
          type: string
          maxLength: 30
          description: Type of transaction (e.g., SALE, REFUND)
        totalAmount:
          type: number
          format: double
          description: Total monetary amount for the transaction
        paymentMethod:
          type: string
          maxLength: 50
          description: Method used for payment (e.g., CASH, CREDIT_CARD)
      required:
        - transactionType
        - totalAmount
        - paymentMethod
    StoreTransactionCreationRequest:
      type: object
      properties:
        transactionType:
          type: string
          maxLength: 30
          description: Type of transaction (SALE, REFUND)
        paymentMethod:
          type: string
          maxLength: 50
          description: Payment method (CASH, CREDIT_CARD, DEBIT_CARD, DIGITAL_WALLET)
        saleItems:
          type: array
          items:
            $ref: '#/components/schemas/SaleItemRequest'
          minItems: 1
          description: Line items for the transaction
      required:
        - transactionType
        - paymentMethod
        - saleItems
    StoreTransactionCreationResponse:
      type: object
      properties:
        storeTransactionId:
          type: integer
          format: int64
          readOnly: true
          description: Store transaction ID
      required:
        - storeTransactionId
    GetStoreTransactionResponse:
      allOf:
        - $ref: '#/components/schemas/BaseStoreTransaction'
        - type: object
          properties:
            storeTransactionId:
              type: integer
              format: int64
              readOnly: true
              description: Store transaction ID
            transactionDatetime:
              type: string
              format: date-time
              readOnly: true
              description: Timestamp when the transaction was created
            employeeId:
              type: integer
              format: int64
              readOnly: true
              description: ID of the employee who processed the transaction
            saleItems:
              type: array
              items:
                $ref: '#/components/schemas/SaleItemResponse'
              readOnly: true
              description: Line items that comprise this transaction
          required:
            - storeTransactionId
            - transactionType
            - totalAmount
            - paymentMethod
    SaleItemRequest:
      type: object
      properties:
        storeProductId:
          type: integer
          format: int64
          description: ID of the product being purchased
        quantity:
          type: integer
          minimum: 1
          description: Number of units to purchase
      required:
        - storeProductId
        - quantity
    SaleItemResponse:
      type: object
      properties:
        storeSaleItemId:
          type: integer
          format: int64
          readOnly: true
          description: Sale item ID
        storeProductId:
          type: integer
          format: int64
          description: ID of the product sold
        quantity:
          type: integer
          description: Number of units sold
        unitPriceAtSale:
          type: number
          format: double
          description: Unit price at time of sale
        itemTotal:
          type: number
          format: double
          description: Total for this line item (quantity × unitPriceAtSale)
      required:
        - storeSaleItemId
        - storeProductId
        - quantity
        - unitPriceAtSale
        - itemTotal
    ErrorResponse:
      type: object
