spring.datasource.url=jdbc:mariadb://multi_tenant_db:3306/${DATABASE}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Redis (TLS) ─────────────────────────────────────────────────────────────
# Host/port overridden at runtime via SPRING_DATA_REDIS_HOST/PORT env vars.
# The entrypoint builds /app/certs/truststore.p12 with the CA root before launch,
# so the truststore is guaranteed to exist when Spring Boot initialises Redis.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:platform-core-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.ssl.enabled=true
spring.data.redis.ssl.trust-store=file:/app/certs/truststore.p12
spring.data.redis.ssl.trust-store-password=${KEYSTORE_PASS}
spring.data.redis.ssl.trust-store-type=PKCS12

jwt.keystore.path=${JWT_KEYSTORE_PATH}
jwt.keystore.password=${JWT_KEYSTORE_PASSWORD}
jwt.keystore.alias=${JWT_STORE_ALIAS}
jwt.token.validity-ms=1800000

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

logging.level.root=INFO
logging.level.com.akademiaplus=DEBUG

server.port=8080
server.servlet.context-path=/api
spring.application.name=PlatformCore DEV
management.endpoints.web.exposure.include=health,mappings


