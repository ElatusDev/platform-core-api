spring.datasource.url=jdbc:mariadb://multi_tenant_db:3306/${DATABASE}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Redis (plain, internal network) ─────────────────────────────────────────
# No TLS — the akademia-internal Docker network is isolated (internal: true).
# In production, Redis TLS is handled by the infrastructure (K8s, cloud provider).
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:platform-core-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ─── JWT signing key ─────────────────────────────────────────────────────────
# The entrypoint generates an ECDSA P-384 keystore on first run and passes
# the path/password/alias via -Djwt.keystore.* JVM args.
jwt.keystore.path=${JWT_KEYSTORE_PATH:/app/jwt-keystore.p12}
jwt.keystore.password=${JWT_KEYSTORE_PASS:${KEYSTORE_PASS:changeit}}
jwt.keystore.alias=${JWT_KEY_ALIAS:platform-core-api}

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

logging.level.root=INFO
logging.level.com.akademiaplus=DEBUG

# ─── HTTP server (plain — TLS is an infrastructure concern) ──────────────────
server.port=8080

server.servlet.context-path=/api
spring.application.name=PlatformCore DEV
management.endpoints.web.exposure.include=health,mappings


