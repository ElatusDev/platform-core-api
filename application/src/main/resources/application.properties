spring.datasource.url=jdbc:mariadb://localhost:3307/${DATABASE}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

jwt.keystore.path=${KEYSTORE_PATH}
jwt.keystore.password=${KEYSTORE_PASS}
jwt.keystore.alias=${STORE_ALIAS}
jwt.token.validity-ms=1800000

security.encryption-key=${ENCRYPTION_KEY}
mp.access.token=${MP_ACCESS_TOKEN}

server.port=8080
server.servlet.context-path=/api
spring.application.name=PlatformCore PROD
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Structured JSON logging for production (ECS format)
logging.structured.format.console=ecs

# springdoc-openapi 3.x: re-enable Swagger UI (disabled by default in 3.x, replaced by Scalar)
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Email SMTP Configuration (AWS SES via SMTP)
akademia.email.host=${EMAIL_SMTP_HOST:email-smtp.us-east-1.amazonaws.com}
akademia.email.port=${EMAIL_SMTP_PORT:587}
akademia.email.username=${EMAIL_SMTP_USERNAME:}
akademia.email.password=${EMAIL_SMTP_PASSWORD:}
akademia.email.from-address=${EMAIL_FROM_ADDRESS:noreply@akademiaplus.com}
akademia.email.from-name=${EMAIL_FROM_NAME:AkademiaPlus}

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Cookie Configuration
security.cookie.domain=${COOKIE_DOMAIN:localhost}
security.cookie.secure=${COOKIE_SECURE:true}
security.cookie.access-token-name=access_token
security.cookie.refresh-token-name=refresh_token
security.cookie.access-token-max-age-seconds=900
security.cookie.refresh-token-max-age-seconds=2592000

# Refresh Token Configuration
jwt.refresh-token.validity-ms=2592000000

# Per-App Security Configuration
security.app.akademia.token-binding-enabled=false
security.app.akademia.rate-limiting-enabled=false
security.app.akademia.hmac-verification-enabled=false
security.app.akademia.allowed-origins=http://localhost:3000,https://localhost:3000

security.app.elatus.token-binding-enabled=true
security.app.elatus.rate-limiting-enabled=true
security.app.elatus.hmac-verification-enabled=true
security.app.elatus.allowed-origins=http://localhost:3001,https://localhost:3001

# Rate Limiting — ElatusDev origin only
rate-limit.enabled=${RATE_LIMIT_ENABLED:false}
rate-limit.tiers.login.limit=5
rate-limit.tiers.login.window-ms=900000
rate-limit.tiers.public.limit=20
rate-limit.tiers.public.window-ms=60000
rate-limit.tiers.authenticated.limit=100
rate-limit.tiers.authenticated.window-ms=60000

# HMAC API Signing — ElatusDev origin only
security.elatus.hmac.enabled=${HMAC_ENABLED:true}
security.elatus.hmac.timestamp-tolerance-seconds=300
security.elatus.hmac.keys.elatusdev-web=${HMAC_SIGNING_KEY_ELATUSDEV:}

# Token Binding — ElatusDev origin only (anti-hijack)
security.elatus.token-binding.mode=${TOKEN_BINDING_MODE:STRICT}

# IP Whitelist — AkademiaPlus origin restriction
# Production values set per-environment via application-{profile}.properties
security.akademia.allowed-cidrs=

# Passkey / WebAuthn Configuration
security.passkey.rp-id=localhost
security.passkey.rp-name=AkademiaPlus Dev
security.passkey.allowed-origins[0]=http://localhost:3000
security.passkey.challenge-ttl-seconds=300
