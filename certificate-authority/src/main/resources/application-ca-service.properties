# ─── Trust Broker (formerly CA Service) Application Properties ────────────────
# Spring Boot profile: ca-service
#
# Single HTTP port (8082) — TLS is an infrastructure concern handled by the
# orchestrator (reverse proxy in Docker, cert-manager/Istio in Kubernetes).
# All endpoints are reachable on this port, protected by network isolation
# (akademia-internal Docker network / K8s NetworkPolicy).

spring.application.name=trust-broker
server.port=8082

# ─── CA PKI Configuration ─────────────────────────────────────────────────────
ca.cert-path=/certs
ca.serial-file=/certs/akademiaplus-serial.txt
ca.token-manifest=/certs/akademiaplus-tokens.json

# Root CA certificate subject (still generated for JWKS key infrastructure)
ca.root.subject=CN=AkademiaPlus CA,OU=AkademiaPlus,O=ElatusDev,L=GDL,ST=JALISCO,C=MX
ca.root.validity-days=3650

# Leaf certificate constraints (retained for future use)
ca.leaf.validity-days=365
ca.leaf.min-key-size=3072

# CN allowlist — services permitted to register JWKS keys
ca.allowed-common-names=platform-core-api,mock-data-service,webapp-service,notification-service,etl-service,audit-service,pos-system,redis-service
