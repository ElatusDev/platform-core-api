# ─── CA Service Application Properties ───────────────────────────────────────
# Spring Boot profile: ca-service
#
# Port layout:
#   8082 — enrollment (one-way TLS) — Spring Boot owns this via server.ssl.*
#           Entrypoint passes server.ssl.* as JVM -D args AFTER the CA writes
#           its keystore, so the file is guaranteed to exist before Tomcat binds.
#   8081 — mTLS (client-auth=required) — added programmatically in DualPortConfiguration

spring.application.name=ca-service
server.port=8082

# ─── Primary port SSL ─────────────────────────────────────────────────────────
# Defaults reference ca.cert-path so local/IDE runs work without -D args.
# Docker entrypoint overrides these at JVM level after keystore creation.
server.ssl.enabled=true
server.ssl.key-store=${ca.cert-path}/akademiaplus-ca-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${CA_KEYSTORE_PASS}
server.ssl.key-alias=akademiaplus-ca
server.ssl.client-auth=none

# ─── CA PKI Configuration ─────────────────────────────────────────────────────
ca.cert-path=/certs
ca.serial-file=/certs/akademiaplus-serial.txt
ca.token-manifest=/certs/akademiaplus-tokens.json

# Dual-port configuration
ca.mtls.port=8081
ca.enrollment.port=8082

# Root CA certificate subject
ca.root.subject=CN=AkademiaPlus CA,OU=AkademiaPlus,O=ElatusDev,L=GDL,ST=JALISCO,C=MX
ca.root.validity-days=3650

# Leaf certificate constraints
ca.leaf.validity-days=365
ca.leaf.min-key-size=3072

# CN allowlist — only these CNs may enroll or renew certificates
ca.allowed-common-names=platform-core-api,mock-data-system,webapp-service,notification-service,etl-service,audit-service,pos-system,redis-service
