# ─── CA Service Application Properties ───────────────────────────────────────
# Spring Boot profile: ca-service
# Disable Spring Boot SSL auto-configuration — SSL is configured programmatically
# in DualPortConfiguration to allow both enrollment (8082) and mTLS (8081) ports.

spring.application.name=ca-service

# Primary port (enrollment, one-way TLS). SSL is applied programmatically.
server.port=8082
server.ssl.enabled=false

# ─── CA PKI Configuration ─────────────────────────────────────────────────────
ca.cert-path=/certs
ca.serial-file=/certs/serial.txt
ca.token-manifest=/certs/tokens.json

# Dual-port configuration
ca.mtls.port=8081
ca.enrollment.port=8082

# Root CA certificate subject
ca.root.subject=CN=AkademiaPlus CA,OU=AkademiaPlus,O=ElatusDev,L=GDL,ST=JALISCO,C=MX
ca.root.validity-days=3650

# Leaf certificate constraints
ca.leaf.validity-days=365
ca.leaf.min-key-size=3072

# CN allowlist — only these CNs may enroll or renew certificates
ca.allowed-common-names=platform-core-api,mock-data-system,notification-service,etl-service,audit-service,pos-system,redis-service
