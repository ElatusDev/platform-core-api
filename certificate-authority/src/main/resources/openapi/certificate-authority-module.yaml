openapi: 3.0.0
info:
  title: Certificate Authority Service
  version: 1.0.0
  description: API for requesting and managing certificates for other microservices.
tags:
  - name: Certificate Authority
    description: API for signing CSRs and retrieving the root CA certificate
  - name: Enrollment
    description: One-time bootstrap enrollment for new services

paths:
  /ca/sign-cert:
    post:
      tags:
        - Certificate Authority
      summary: Signs a Certificate Signing Request (CSR) via mTLS-authenticated channel
      operationId: signCertificate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateRequest'
      responses:
        '200':
          description: Certificate signed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'
        '400':
          description: Invalid request data or CSR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ca/ca.crt:
    get:
      tags:
        - Certificate Authority
      summary: Retrieves the Root CA certificate in PEM format (unauthenticated)
      operationId: getCaCertificate
      responses:
        '200':
          description: Root CA certificate retrieved successfully
          content:
            text/plain:
              schema:
                type: string
        '500':
          description: An unexpected error occurred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ca/enroll:
    post:
      tags:
        - Enrollment
      summary: One-time bootstrap enrollment for new services
      operationId: enrollService
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentRequest'
      responses:
        '200':
          description: Enrollment successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'
        '400':
          description: Invalid CSR
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid or expired bootstrap token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Token CN mismatch or token already used
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ca/.well-known/jwks.json:
    get:
      tags:
        - JWKS
      summary: Returns all registered JWT public keys in JWKS format (unauthenticated)
      operationId: getJwks
      responses:
        '200':
          description: JWKS document containing all registered service public keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JwksDocument'

  /ca/jwks/register:
    post:
      tags:
        - JWKS
      summary: Register a service JWT public key with the CA trust broker (mTLS)
      description: |
        Called by enrolled services after startup to publish their JWT signing
        public key. Requires a valid client certificate (mTLS port 8081).
        The CA stores the key indexed by the CN from the client certificate.
      operationId: registerJwks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JwksRegistrationRequest'
      responses:
        '204':
          description: Public key registered successfully
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CertificateRequest:
      type: object
      description: DTO for requesting a new signed certificate via mTLS-authenticated channel
      properties:
        commonName:
          type: string
          description: The Common Name (CN) for the new certificate
          example: "platform-core-api"
        organization:
          type: string
          description: The Organization (O) for the new certificate
          example: "ElatusDev"
        certificateSigningRequest:
          type: string
          description: Base64-encoded PKCS#10 CSR (base64 of PEM-formatted CSR)
      required:
        - commonName
        - organization
        - certificateSigningRequest

    EnrollmentRequest:
      type: object
      description: DTO for one-time bootstrap enrollment using a pre-issued token
      properties:
        bootstrapToken:
          type: string
          description: One-time enrollment token bound to this service's CN
        commonName:
          type: string
          description: The Common Name (CN) for the new certificate — must match the token's bound CN
          example: "platform-core-api"
        organization:
          type: string
          description: The Organization (O) for the new certificate
          example: "ElatusDev"
        certificateSigningRequest:
          type: string
          description: Base64-encoded PKCS#10 CSR (base64 of PEM-formatted CSR)
      required:
        - bootstrapToken
        - commonName
        - certificateSigningRequest

    CertificateResponse:
      type: object
      description: DTO for the signed certificate response
      properties:
        signedCertificate:
          type: string
          description: Base64-encoded PEM signed certificate
        caCertificate:
          type: string
          description: Base64-encoded PEM root CA certificate
      required:
        - signedCertificate
        - caCertificate

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable error message

    JwksRegistrationRequest:
      type: object
      description: Public key registration payload sent by an enrolled service
      properties:
        kid:
          type: string
          description: Key ID — typically the service CN (e.g. "platform-core-api")
          example: "platform-core-api"
        alg:
          type: string
          description: JWT signing algorithm (e.g. ES384, RS256)
          example: "ES384"
        publicKeyBase64:
          type: string
          description: Base64-encoded DER SubjectPublicKeyInfo (X.509 public key)
      required:
        - kid
        - alg
        - publicKeyBase64

    JwksDocument:
      type: object
      description: RFC 7517 JSON Web Key Set
      properties:
        keys:
          type: array
          items:
            $ref: '#/components/schemas/JwkKey'

    JwkKey:
      type: object
      description: A single JSON Web Key entry
      properties:
        kty:
          type: string
          example: "EC"
        use:
          type: string
          example: "sig"
        kid:
          type: string
          example: "platform-core-api"
        alg:
          type: string
          example: "ES384"
        crv:
          type: string
          example: "P-384"
        x:
          type: string
          description: EC public key X coordinate, base64url-encoded
        y:
          type: string
          description: EC public key Y coordinate, base64url-encoded
        n:
          type: string
          description: RSA modulus, base64url-encoded (RSA keys only)
        e:
          type: string
          description: RSA public exponent, base64url-encoded (RSA keys only)
