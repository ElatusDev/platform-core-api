# =============================================================================
# Mock Data Service — TEST CONFIGURATION
# =============================================================================
# Shadows the main mock-data-service.properties so integration tests
# do not depend on environment variables. Datasource properties are
# overridden at runtime by @DynamicPropertySource in AbstractIntegrationTest.
# =============================================================================

# --- Datasource (overridden by Testcontainers @DynamicPropertySource) --------
spring.datasource.url=jdbc:mariadb://localhost:3307/multi_tenant_db
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.username=test_user
spring.datasource.password=test_password

# --- Connection pool ---------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# --- Encoding ----------------------------------------------------------------
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# --- JWT (test keystore in src/test/resources) -------------------------------
jwt.keystore.path=classpath:test-keystore.p12
jwt.keystore.password=testpassword
jwt.keystore.alias=test-jwt
jwt.token.validity-ms=1800000

# --- Encryption (AES-256-GCM test key) --------------------------------------
security.encryption-key=zZhnG8Pe0W9bOHWNDrqTNHC0sDIdVHEsCW/jJWPt1cI=

# --- Payment gateway (dummy test token) --------------------------------------
mp.access.token=TEST-0000000000000000-000000-ffffffffffffffffffffffffffffffff-000000000

# --- Logging -----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.akademiaplus=DEBUG

# --- Server ------------------------------------------------------------------
server.port=8180
server.servlet.context-path=/infra
spring.application.name=Infra-Mock-Data-Service-TEST
management.endpoints.web.exposure.include=mappings

api.mock.data.service.base-uri=/infra/v1/mock-data/generate
