# No need to configure datasource here - it's done dynamically!
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate

jwt.keystore.path=${KEYSTORE_PATH}
jwt.keystore.password=${KEYSTORE_PASS}
jwt.keystore.alias=${STORE_ALIAS}
jwt.token.validity-ms=900000

security.encryption-key=${ENCRYPTION_KEY}
mp.access.token=${MP_ACCESS_TOKEN}

# If you want to speed up tests
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true