spring.datasource.url=jdbc:mariadb://localhost:3316/${DATABASE}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

jwt.keystore.path=${KEYSTORE_PATH}
jwt.keystore.password=${KEYSTORE_PASS}
jwt.keystore.alias=${STORE_ALIAS}
jwt.token.validity-ms=3600000
jwt.refresh-token.validity-ms=2592000000

security.encryption-key=${ENCRYPTION_KEY}
mp.access.token=${MP_ACCESS_TOKEN}

security.cookie.domain=${COOKIE_DOMAIN:localhost}
security.cookie.secure=${COOKIE_SECURE:true}
security.cookie.access-token-name=access_token
security.cookie.refresh-token-name=refresh_token
security.cookie.access-token-max-age-seconds=900
security.cookie.refresh-token-max-age-seconds=2592000

akademia.email.host=${EMAIL_SMTP_HOST:email-smtp.us-east-1.amazonaws.com}
akademia.email.port=${EMAIL_SMTP_PORT:587}
akademia.email.username=${EMAIL_SMTP_USERNAME:}
akademia.email.password=${EMAIL_SMTP_PASSWORD:}
akademia.email.from-address=${EMAIL_FROM_ADDRESS:noreply@akademiaplus.com}
akademia.email.from-name=${EMAIL_FROM_NAME:AkademiaPlus}
akademia.email.ses-configuration-set=${SES_CONFIGURATION_SET:}
app.phone.default-region=MX

logging.level.root=INFO
logging.level.com.akademiaplus=DEBUG

server.port=8180
server.servlet.context-path=/infra
spring.application.name=Infra-Mock-Data-Service
spring.main.allow-bean-definition-overriding=true
management.endpoints.web.exposure.include=health,mappings

api.mock.data.service.base-uri=/infra/v1/mock-data/generate