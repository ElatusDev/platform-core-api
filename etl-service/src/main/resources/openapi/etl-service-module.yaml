openapi: 3.0.3
info:
  title: ETL Service API
  description: Extract, Transform, Load service for data migration, synchronization, and business intelligence data preparation across multi-tenant platform
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@company.com

servers:
  - url: http://localhost:8080/api/v1/etl
    description: Local development server
  - url: https://api.platform.com/v1/etl
    description: Production server

security:
  - BearerAuth: []

paths:
  /jobs:
    post:
      summary: Create ETL job
      description: Create a new ETL job for data processing
      operationId: createEtlJob
      tags:
        - ETL Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEtlJobRequest'
      responses:
        '201':
          description: ETL job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtlJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    get:
      summary: List ETL jobs
      description: Retrieve list of ETL jobs with filtering and pagination
      operationId: listEtlJobs
      tags:
        - ETL Jobs
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/JobType'
        - $ref: '#/components/parameters/Status'
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: ETL jobs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtlJobPageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /jobs/{jobId}:
    get:
      summary: Get ETL job details
      description: Retrieve detailed information about a specific ETL job
      operationId: getEtlJob
      tags:
        - ETL Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the ETL job
      responses:
        '200':
          description: ETL job details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtlJobDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      summary: Update ETL job
      description: Update an existing ETL job configuration
      operationId: updateEtlJob
      tags:
        - ETL Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the ETL job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEtlJobRequest'
      responses:
        '200':
          description: ETL job updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EtlJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    delete:
      summary: Delete ETL job
      description: Delete an ETL job and its associated data
      operationId: deleteEtlJob
      tags:
        - ETL Jobs
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the ETL job
      responses:
        '204':
          description: ETL job deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /jobs/{jobId}/execute:
    post:
      summary: Execute ETL job
      description: Start execution of an ETL job
      operationId: executeEtlJob
      tags:
        - ETL Execution
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the ETL job
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteJobRequest'
      responses:
        '202':
          description: ETL job execution started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Job already running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs/{jobId}/executions:
    get:
      summary: Get job execution history
      description: Retrieve execution history for a specific ETL job
      operationId: getJobExecutions
      tags:
        - ETL Execution
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the ETL job
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Job execution history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionPageResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /executions/{executionId}:
    get:
      summary: Get execution details
      description: Retrieve detailed information about a specific job execution
      operationId: getExecution
      tags:
        - ETL Execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the execution
      responses:
        '200':
          description: Execution details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /executions/{executionId}/stop:
    post:
      summary: Stop job execution
      description: Stop a running job execution
      operationId: stopExecution
      tags:
        - ETL Execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the execution
      responses:
        '200':
          description: Execution stopped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobExecutionResponse'
        '400':
          description: Cannot stop execution in current state
        '404':
          $ref: '#/components/responses/NotFound'

  /executions/{executionId}/logs:
    get:
      summary: Get execution logs
      description: Retrieve logs for a specific job execution
      operationId: getExecutionLogs
      tags:
        - ETL Execution
      parameters:
        - name: executionId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the execution
        - name: level
          in: query
          schema:
            type: string
            enum: [ERROR, WARN, INFO, DEBUG]
          description: Filter logs by level
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Get logs since this timestamp
      responses:
        '200':
          description: Execution logs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionLogsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /templates:
    get:
      summary: List job templates
      description: Retrieve available ETL job templates
      operationId: listJobTemplates
      tags:
        - Templates
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [migration, sync, bi_export, backup, cleanup]
          description: Filter templates by category
      responses:
        '200':
          description: Job templates retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobTemplateListResponse'

  /templates/{templateId}:
    get:
      summary: Get job template
      description: Retrieve a specific job template with configuration details
      operationId: getJobTemplate
      tags:
        - Templates
      parameters:
        - name: templateId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the template
      responses:
        '200':
          description: Job template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobTemplateResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /connections:
    get:
      summary: List data connections
      description: Retrieve available data source and destination connections
      operationId: listConnections
      tags:
        - Connections
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: type
          in: query
          schema:
            type: string
            enum: [source, destination]
          description: Filter by connection type
      responses:
        '200':
          description: Connections retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionListResponse'

    post:
      summary: Create data connection
      description: Create a new data source or destination connection
      operationId: createConnection
      tags:
        - Connections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConnectionRequest'
      responses:
        '201':
          description: Connection created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionResponse'

  /connections/{connectionId}/test:
    post:
      summary: Test data connection
      description: Test connectivity to a data source or destination
      operationId: testConnection
      tags:
        - Connections
      parameters:
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier of the connection
      responses:
        '200':
          description: Connection test completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionTestResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantId:
      name: tenantId
      in: query
      schema:
        type: string
      description: Filter by tenant ID
    JobType:
      name: jobType
      in: query
      schema:
        type: string
        enum: [migration, sync, bi_export, backup, cleanup, custom]
      description: Filter by job type
    Status:
      name: status
      in: query
      schema:
        type: string
        enum: [pending, running, completed, failed, cancelled]
      description: Filter by job status
    DateFrom:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date-time
      description: Filter from this date
    DateTo:
      name: dateTo
      in: query
      schema:
        type: string
        format: date-time
      description: Filter until this date
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Page number (0-based)
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Page size

  schemas:
    CreateEtlJobRequest:
      type: object
      required:
        - name
        - type
        - sourceConnection
        - destinationConnection
      properties:
        name:
          type: string
          description: Human-readable job name
        description:
          type: string
          description: Job description
        type:
          $ref: '#/components/schemas/JobType'
        tenantId:
          type: string
          description: Tenant identifier (for tenant-specific jobs)
        sourceConnection:
          $ref: '#/components/schemas/ConnectionConfig'
        destinationConnection:
          $ref: '#/components/schemas/ConnectionConfig'
        transformations:
          type: array
          items:
            $ref: '#/components/schemas/TransformationRule'
        schedule:
          $ref: '#/components/schemas/JobSchedule'
        configuration:
          type: object
          description: Job-specific configuration (JSON)

    UpdateEtlJobRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        schedule:
          $ref: '#/components/schemas/JobSchedule'
        configuration:
          type: object
        isActive:
          type: boolean

    EtlJobResponse:
      type: object
      properties:
        jobId:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          $ref: '#/components/schemas/JobType'
        tenantId:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        schedule:
          $ref: '#/components/schemas/JobSchedule'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        lastExecutedAt:
          type: string
          format: date-time
        nextExecutionAt:
          type: string
          format: date-time

    EtlJobDetailResponse:
      allOf:
        - $ref: '#/components/schemas/EtlJobResponse'
        - type: object
          properties:
            sourceConnection:
              $ref: '#/components/schemas/ConnectionConfig'
            destinationConnection:
              $ref: '#/components/schemas/ConnectionConfig'
            transformations:
              type: array
              items:
                $ref: '#/components/schemas/TransformationRule'
            configuration:
              type: object
            executionStats:
              $ref: '#/components/schemas/ExecutionStats'

    ExecuteJobRequest:
      type: object
      properties:
        parameters:
          type: object
          description: Runtime parameters for the job
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal

    JobExecutionResponse:
      type: object
      properties:
        executionId:
          type: string
        jobId:
          type: string
        status:
          $ref: '#/components/schemas/ExecutionStatus'
        startedAt:
          type: string
          format: date-time
        estimatedCompletionAt:
          type: string
          format: date-time
        progress:
          $ref: '#/components/schemas/ExecutionProgress'

    JobExecutionDetailResponse:
      allOf:
        - $ref: '#/components/schemas/JobExecutionResponse'
        - type: object
          properties:
            completedAt:
              type: string
              format: date-time
            duration:
              type: integer
              description: Execution duration in seconds
            recordsProcessed:
              type: integer
              format: int64
            recordsSuccessful:
              type: integer
              format: int64
            recordsFailed:
              type: integer
              format: int64
            errorMessage:
              type: string
            metrics:
              type: object
              description: Execution metrics and statistics

    JobType:
      type: string
      enum:
        - migration
        - sync
        - bi_export
        - backup
        - cleanup
        - custom
      description: Type of ETL job

    JobStatus:
      type: string
      enum:
        - active
        - inactive
        - archived
      description: Current status of the job

    ExecutionStatus:
      type: string
      enum:
        - pending
        - running
        - completed
        - failed
        - cancelled
        - timeout
      description: Status of job execution

    JobSchedule:
      type: object
      properties:
        type:
          type: string
          enum: [manual, cron, interval]
        cronExpression:
          type: string
          description: Cron expression for scheduled jobs
        intervalMinutes:
          type: integer
          description: Interval in minutes for recurring jobs
        timezone:
          type: string
          description: Timezone for scheduled execution
        isEnabled:
          type: boolean
          default: true

    ConnectionConfig:
      type: object
      required:
        - connectionId
        - type
      properties:
        connectionId:
          type: string
        type:
          type: string
          enum: [database, file, api, queue]
        parameters:
          type: object
          description: Connection-specific parameters

    TransformationRule:
      type: object
      required:
        - type
        - configuration
      properties:
        id:
          type: string
        type:
          type: string
          enum: [filter, map, aggregate, join, split, validate]
        configuration:
          type: object
          description: Transformation-specific configuration
        order:
          type: integer
          description: Order of execution

    ExecutionProgress:
      type: object
      properties:
        percentage:
          type: number
          format: float
          minimum: 0
          maximum: 100
        currentStep:
          type: string
        totalSteps:
          type: integer
        recordsProcessed:
          type: integer
          format: int64
        estimatedTotalRecords:
          type: integer
          format: int64

    ExecutionStats:
      type: object
      properties:
        totalExecutions:
          type: integer
        successfulExecutions:
          type: integer
        failedExecutions:
          type: integer
        averageDuration:
          type: number
          description: Average duration in seconds
        lastSuccessfulExecution:
          type: string
          format: date-time
        lastFailedExecution:
          type: string
          format: date-time

    CreateConnectionRequest:
      type: object
      required:
        - name
        - type
        - connectionType
        - configuration
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [source, destination]
        connectionType:
          type: string
          enum: [mysql, postgresql, mariadb, mongodb, redis, s3, ftp, http_api]
        tenantId:
          type: string
        configuration:
          type: object
          description: Connection-specific configuration (encrypted)

    ConnectionResponse:
      type: object
      properties:
        connectionId:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        connectionType:
          type: string
        tenantId:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        lastTestedAt:
          type: string
          format: date-time
        testStatus:
          type: string
          enum: [untested, success, failed]

    ConnectionTestResponse:
      type: object
      properties:
        connectionId:
          type: string
        status:
          type: string
          enum: [success, failed]
        message:
          type: string
        testedAt:
          type: string
          format: date-time
        responseTime:
          type: integer
          description: Connection response time in milliseconds

    JobTemplateResponse:
      type: object
      properties:
        templateId:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        type:
          $ref: '#/components/schemas/JobType'
        configuration:
          type: object
          description: Template configuration schema
        requiredParameters:
          type: array
          items:
            type: string

    ExecutionLogsResponse:
      type: object
      properties:
        executionId:
          type: string
        logs:
          type: array
          items:
            $ref: '#/components/schemas/LogEntry'
        hasMore:
          type: boolean

    LogEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [ERROR, WARN, INFO, DEBUG]
        message:
          type: string
        component:
          type: string
        metadata:
          type: object

    EtlJobPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EtlJobResponse'
        page:
          $ref: '#/components/schemas/PageInfo'

    JobExecutionPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/JobExecutionResponse'
        page:
          $ref: '#/components/schemas/PageInfo'

    JobTemplateListResponse:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/JobTemplateResponse'

    ConnectionListResponse:
      type: object
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionResponse'

    PageInfo:
      type: object
      properties:
        number:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'