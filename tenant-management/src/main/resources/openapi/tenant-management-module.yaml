openapi: 3.0.3
info:
  title: Platform Core API - Tenant Management
  description: API for managing tenants, subscriptions, and billing cycles in a multi-tenant system
  version: 1.0.0
  contact:
    name: API Support
    email: api-support@example.com

servers:
  - url: https://api.example.com/v1
    description: Production server
  - url: https://staging-api.example.com/v1
    description: Staging server
  - url: http://localhost:8080/v1
    description: Development server

tags:
  - name: Tenants
    description: Tenant management operations
  - name: Subscriptions
    description: Tenant subscription management
  - name: Billing
    description: Billing cycle operations

paths:
  /tenants:
    get:
      tags:
        - Tenants
      summary: List all tenants
      description: Retrieve a paginated list of tenants
      operationId: listTenants
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          description: Search by organization name or email
          required: false
          schema:
            type: string

      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Tenants
      summary: Create a new tenant
      description: Register a new tenant organization
      operationId: createTenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreateRequest'
      responses:
        '201':
          description: Tenant created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tenants/{tenantId}:
    get:
      tags:
        - Tenants
      summary: Get tenant by ID
      description: Retrieve detailed information about a specific tenant
      operationId: getTenant
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: include_subscriptions
          in: query
          description: Include subscription details
          required: false
          schema:
            type: boolean
            default: false
        - name: include_billing
          in: query
          description: Include billing information
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Tenants
      summary: Update tenant
      description: Update tenant information
      operationId: updateTenant
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantUpdateRequest'
      responses:
        '200':
          description: Tenant updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Tenants
      summary: Delete tenant
      description: Delete a tenant
      operationId: deleteTenant
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '204':
          description: Tenant deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tenants/{tenantId}/subscriptions:
    get:
      tags:
        - Subscriptions
      summary: List tenant subscriptions
      description: Get all subscriptions for a specific tenant
      operationId: listTenantSubscriptions
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Subscriptions
      summary: Create subscription
      description: Add a new subscription for the tenant
      operationId: createTenantSubscription
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreateRequest'
      responses:
        '201':
          description: Subscription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tenants/{tenantId}/subscriptions/{subscriptionId}:
    get:
      tags:
        - Subscriptions
      summary: Get subscription details
      description: Retrieve details of a specific subscription
      operationId: getTenantSubscription
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Subscriptions
      summary: Update subscription
      description: Update subscription details
      operationId: updateTenantSubscription
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionUpdateRequest'
      responses:
        '200':
          description: Subscription updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Subscriptions
      summary: Cancel subscription
      description: Cancel a subscription
      operationId: cancelTenantSubscription
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '204':
          description: Subscription cancelled successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tenants/{tenantId}/billing-cycles:
    get:
      tags:
        - Billing
      summary: List billing cycles
      description: Get all billing cycles for a tenant
      operationId: listBillingCycles
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: from_date
          in: query
          description: Filter billing cycles from this date
          required: false
          schema:
            type: string
            format: date
        - name: to_date
          in: query
          description: Filter billing cycles until this date
          required: false
          schema:
            type: string
            format: date
        - name: status
          in: query
          description: Filter by billing status
          required: false
          schema:
            $ref: '#/components/schemas/BillingStatus'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BillingCycle'
                  summary:
                    type: object
                    properties:
                      total_billed:
                        type: number
                        format: double
                      total_paid:
                        type: number
                        format: double
                      total_pending:
                        type: number
                        format: double
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Billing
      summary: Create billing cycle
      description: Generate a new billing cycle for the tenant
      operationId: createBillingCycle
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillingCycleCreateRequest'
      responses:
        '201':
          description: Billing cycle created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCycle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /tenants/{tenantId}/billing-cycles/{billingCycleId}:
    get:
      tags:
        - Billing
      summary: Get billing cycle details
      description: Retrieve details of a specific billing cycle
      operationId: getBillingCycle
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BillingCycleId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCycleDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags:
        - Billing
      summary: Update billing cycle status
      description: Update the status of a billing cycle
      operationId: updateBillingCycleStatus
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/BillingCycleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: '#/components/schemas/BillingStatus'
                notes:
                  type: string
                  description: Additional notes about the status change
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingCycle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ===== TENANT BRANDING ENDPOINTS =====
  '/tenant/branding':
    $ref: './tenant-branding.yaml#/paths/~1tenant~1branding'

  /tenants/{tenantId}/calculate-billing:
    post:
      tags:
        - Billing
      summary: Calculate billing
      description: Calculate billing for current period based on active users
      operationId: calculateBilling
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - billing_month
              properties:
                billing_month:
                  type: string
                  pattern: '^[0-9]{4}-[0-9]{2}$'
                  description: Billing month in YYYY-MM format
                  example: "2025-01"
      responses:
        '200':
          description: Billing calculated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_count:
                    type: integer
                    description: Number of active users
                  rate_per_student:
                    type: number
                    format: double
                  total_amount:
                    type: number
                    format: double
                  billing_cycle:
                    $ref: '#/components/schemas/BillingCycle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Billing already exists for this period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    TenantId:
      name: tenantId
      in: path
      description: Unique identifier of the tenant
      required: true
      schema:
        type: integer
        format: int64

    SubscriptionId:
      name: subscriptionId
      in: path
      description: Unique identifier of the subscription
      required: true
      schema:
        type: integer
        format: int64

    BillingCycleId:
      name: billingCycleId
      in: path
      description: Unique identifier of the billing cycle
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    Tenant:
      type: object
      properties:
        tenant_id:
          type: integer
          format: int64

          readOnly: true
        organization_name:
          type: string
          maxLength: 200
        legal_name:
          type: string
          maxLength: 200
        website_url:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 200
        address:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 20
        landline:
          type: string
          maxLength: 20
        description:
          type: string
        tax_id:
          type: string
          maxLength: 50
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - organization_name
        - email
        - address

    TenantDetails:
      allOf:
        - $ref: '#/components/schemas/Tenant'
        - type: object
          properties:
            subscriptions:
              type: array
              items:
                $ref: '#/components/schemas/TenantSubscription'
            current_billing_cycle:
              $ref: '#/components/schemas/BillingCycle'
            statistics:
              type: object
              properties:
                total_users:
                  type: integer
                total_active_subscriptions:
                  type: integer
                current_month_billing:
                  type: number
                  format: double

    TenantCreateRequest:
      type: object
      required:
        - organization_name
        - email
        - address
      properties:
        organization_name:
          type: string
          maxLength: 200
        legal_name:
          type: string
          maxLength: 200
        website_url:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 200
        address:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 20
        landline:
          type: string
          maxLength: 20
        description:
          type: string
        tax_id:
          type: string
          maxLength: 50

    TenantUpdateRequest:
      type: object
      properties:
        organization_name:
          type: string
          maxLength: 200
        legal_name:
          type: string
          maxLength: 200
        website_url:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 200
        address:
          type: string
          maxLength: 200
        phone:
          type: string
          maxLength: 20
        landline:
          type: string
          maxLength: 20
        description:
          type: string
        tax_id:
          type: string
          maxLength: 50

    TenantSubscription:
      type: object
      properties:
        tenant_subscription_id:
          type: integer
          format: int64

          readOnly: true
        tenant_id:
          type: integer
          format: int64

          readOnly: true
        type:
          type: string
          enum: [basic, standard, premium, enterprise]
          maxLength: 30
        max_users:
          type: integer

          nullable: true
        billing_date:
          type: string
          format: date
        rate_per_student:
          type: number
          format: double
          minimum: 0
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - type
        - billing_date
        - rate_per_student

    SubscriptionCreateRequest:
      type: object
      required:
        - type
        - billing_date
        - rate_per_student
      properties:
        type:
          type: string
          enum: [basic, standard, premium, enterprise]
        max_users:
          type: integer

          nullable: true
        billing_date:
          type: string
          format: date
        rate_per_student:
          type: number
          format: double
          minimum: 0

    SubscriptionUpdateRequest:
      type: object
      properties:
        type:
          type: string
          enum: [basic, standard, premium, enterprise]
        max_users:
          type: integer

          nullable: true
        billing_date:
          type: string
          format: date
        rate_per_student:
          type: number
          format: double
          minimum: 0

    BillingStatus:
      type: string
      enum:
        - pending
        - billed
        - paid
        - failed
        - cancelled

    BillingCycle:
      type: object
      properties:
        tenant_billing_cycle_id:
          type: integer
          format: int64

          readOnly: true
        tenant_id:
          type: integer
          format: int64

          readOnly: true
        billing_month:
          type: string
          pattern: '^[0-9]{4}-[0-9]{2}$'
          description: YYYY-MM format
        calculation_date:
          type: string
          format: date
        user_count:
          type: integer

        total_amount:
          type: number
          format: double
        billing_status:
          $ref: '#/components/schemas/BillingStatus'
        billed_at:
          type: string
          format: date-time
          nullable: true
        paid_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - billing_month
        - calculation_date
        - user_count
        - total_amount

    BillingCycleDetails:
      allOf:
        - $ref: '#/components/schemas/BillingCycle'
        - type: object
          properties:
            subscription_details:
              $ref: '#/components/schemas/TenantSubscription'
            tenant_info:
              $ref: '#/components/schemas/Tenant'

    BillingCycleCreateRequest:
      type: object
      required:
        - billing_month
        - calculation_date
        - user_count
        - total_amount
      properties:
        billing_month:
          type: string
          pattern: '^[0-9]{4}-[0-9]{2}$'
          description: YYYY-MM format
        calculation_date:
          type: string
          format: date
        user_count:
          type: integer
          minimum: 0
        total_amount:
          type: number
          format: double
          minimum: 0
        notes:
          type: string

    TenantBrandingUpdateRequest:
      $ref: './tenant-branding.yaml#/components/schemas/TenantBrandingUpdateRequest'
    GetTenantBrandingResponse:
      $ref: './tenant-branding.yaml#/components/schemas/GetTenantBrandingResponse'

    Pagination:
      type: object
      properties:
        page:
          type: integer

        limit:
          type: integer

        total_pages:
          type: integer

        total_items:
          type: integer


    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token for authentication

    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for service-to-service authentication

security:
  - BearerAuth: []
  - ApiKeyAuth: []