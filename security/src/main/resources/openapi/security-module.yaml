    LoginRequest:
      $ref: './internal-authentication.yaml#/components/schemas/LoginRequest'
    RegistrationRequest:
      $ref: './registration.yaml#/components/schemas/RegistrationRequest'
    RegistrationResponse:
      $ref: './registration.yaml#/components/schemas/RegistrationResponse'
    PasskeyRegisterOptionsRequest:
      $ref: './passkey-authentication.yaml#/components/schemas/PasskeyRegisterOptionsRequest'
    PasskeyRegisterOptionsResponse:
      $ref: './passkey-authentication.yaml#/components/schemas/PasskeyRegisterOptionsResponse'
    PasskeyRegisterCompleteRequest:
      $ref: './passkey-authentication.yaml#/components/schemas/PasskeyRegisterCompleteRequest'
    PasskeyRegisterCompleteResponse:
      $ref: './passkey-authentication.yaml#/components/schemas/PasskeyRegisterCompleteResponse'
    PasskeyLoginOptionsRequest:
      $ref: './passkey-authentication.yaml#/components/schemas/PasskeyLoginOptionsRequest'
    PasskeyLoginOptionsResponse:
