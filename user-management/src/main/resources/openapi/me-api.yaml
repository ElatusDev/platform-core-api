openapi: 3.0.3
info:
  title: Current User API
  description: API for resolving the authenticated user's profile from JWT
  version: 1.0.0

paths:
  /me:
    get:
      tags:
        - CurrentUser
      summary: Get the current authenticated user's profile
      description: |
        Resolves the authenticated user from the JWT token and returns their
        profile. Supports employees and collaborators (internal auth users).
      operationId: getCurrentUser
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCurrentUserResponse'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

components:
  schemas:
    GetCurrentUserResponse:
      type: object
      required:
        - userType
      properties:
        userType:
          type: string
          description: The type of user profile resolved from the JWT
          enum: [EMPLOYEE, COLLABORATOR]
          example: "EMPLOYEE"
        employeeId:
          type: integer
          format: int64
          description: Present when userType is EMPLOYEE
          nullable: true
        collaboratorId:
          type: integer
          format: int64
          description: Present when userType is COLLABORATOR
          nullable: true
        internalAuthId:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        address:
          type: string
        zipCode:
          type: string
        birthdate:
          type: string
          format: date
        entryDate:
          type: string
          format: date
        profilePictureUrl:
          type: string
          format: uri
          nullable: true
        username:
          type: string
        role:
          type: string
        employeeType:
          type: string
          description: Present when userType is EMPLOYEE
          nullable: true
        skills:
          type: string
          description: Present when userType is COLLABORATOR
          nullable: true
