openapi: 3.0.3
info:
  title: Employee API
  description: API for managing employees with internal authentication
  version: 1.0.0

paths:
  /employees:
    get:
      tags:
        - Employees
      summary: List all employees
      operationId: getAllEmployees
      parameters:
        - $ref: './commons.yaml#/components/parameters/PageParam'
        - $ref: './commons.yaml#/components/parameters/SizeParam'
        - name: employeeType
          in: query
          schema:
            type: string
            maxLength: 50
        - name: entryDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: entryDateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './base-components.yaml#/components/schemas/GetAllEmployeeResponse'
                  pagination:
                    $ref: './commons.yaml#/components/schemas/PaginationInfo'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'

    post:
      tags:
        - Employees
      summary: Create new employee
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreationRequest'
      responses:
        '201':
          description: Employee created successfully
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/EmployeeCreationResponse'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '409':
          $ref: './commons.yaml#/components/responses/Conflict'

  /employees/{employeeId}:
    get:
      tags:
        - Employees
      summary: Get employee by ID
      operationId: getEmployee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
  
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/GetEmployeeResponse'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

    put:
      tags:
        - Employees
      summary: Update employee
      operationId: updateEmployee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
  
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdateRequest'
      responses:
        '200':
          description: Employee updated successfully
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/EmployeeUpdateResponse'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

    delete:
      tags:
        - Employees
      summary: Soft delete employee
      operationId: deleteEmployee
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
  
      responses:
        '204':
          description: Employee deleted successfully
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

components:
  schemas:
    EmployeeCreationRequest:
      allOf:
        - $ref: './base-components.yaml#/components/schemas/EmployeeBaseFields'
        - $ref: './base-components.yaml#/components/schemas/PersonPiiFields'
        - $ref: './base-components.yaml#/components/schemas/InternalAuthFields'
      required:
        - employeeType
        - birthdate
        - entryDate
        - username
        - password
        - role
        - firstName
        - lastName
        - email
        - phoneNumber
        - address
        - zipCode

    EmployeeUpdateRequest:
      allOf:
        - $ref: './base-components.yaml#/components/schemas/EmployeeBaseFields'
        - $ref: './base-components.yaml#/components/schemas/PersonPiiFields'
        - type: object
          properties:
            role:
              type: string
              maxLength: 500