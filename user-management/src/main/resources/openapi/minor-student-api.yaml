openapi: 3.0.3
info:
  title: Minor Student API
  description: API for managing minor students with tutor relationships
  version: 1.0.0

paths:
  /minor-students:
    get:
      tags:
        - MinorStudents
      summary: List all minor students
      operationId: getAllMinorStudents
      parameters:
        - $ref: './commons.yaml#/components/parameters/PageParam'
        - $ref: './commons.yaml#/components/parameters/SizeParam'
        - name: tutorId
          in: query
          description: Filter by tutor ID
          schema:
            type: integer

      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './base-components.yaml#/components/schemas/GetAllMinorStudentResponse'
                  pagination:
                    $ref: './commons.yaml#/components/schemas/PaginationInfo'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'

    post:
      tags:
        - MinorStudents
      summary: Create new minor student
      operationId: createMinorStudent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinorStudentCreationRequest'
      responses:
        '201':
          description: Minor student created successfully
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/MinorStudentCreationResponse'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '409':
          $ref: './commons.yaml#/components/responses/Conflict'

  /minor-students/{minorStudentId}:
    get:
      tags:
        - MinorStudents
      summary: Get minor student by ID
      operationId: getMinorStudent
      parameters:
        - name: minorStudentId
          in: path
          required: true
          schema:
            type: integer
            format: int64

      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/GetMinorStudentResponse'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

    put:
      tags:
        - MinorStudents
      summary: Update minor student
      operationId: updateMinorStudent
      parameters:
        - name: minorStudentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
  
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MinorStudentUpdateRequest'
      responses:
        '200':
          description: Minor student updated successfully
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/MinorStudentUpdateResponse'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

    delete:
      tags:
        - MinorStudents
      summary: Soft delete minor student
      operationId: deleteMinorStudent
      parameters:
        - name: minorStudentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
  
      responses:
        '204':
          description: Minor student deleted successfully
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'
        '409':
          $ref: './commons.yaml#/components/responses/Conflict'

  /minor-students/by-tutor/{tutorId}:
    get:
      tags:
        - MinorStudents
      summary: Get minor students by tutor
      operationId: getMinorStudentsByTutor
      parameters:
        - name: tutorId
          in: path
          required: true
          schema:
            type: integer
            format: int64
  
        - $ref: './commons.yaml#/components/parameters/PageParam'
        - $ref: './commons.yaml#/components/parameters/SizeParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './base-components.yaml#/components/schemas/GetAllMinorStudentResponse'
                  pagination:
                    $ref: './commons.yaml#/components/schemas/PaginationInfo'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

components:
  schemas:
    MinorStudentCreationRequest:
      allOf:
        - $ref: './base-components.yaml#/components/schemas/MinorStudentBaseFields'
        - $ref: './base-components.yaml#/components/schemas/PersonPiiFields'
        - $ref: './base-components.yaml#/components/schemas/CustomerAuthFields'
      required:
        - birthdate
        - tutorId
        - provider
        - token
        - firstName
        - lastName
        - email
        - phoneNumber
        - address
        - zipCode

    MinorStudentUpdateRequest:
      allOf:
        - $ref: './base-components.yaml#/components/schemas/MinorStudentBaseFields'
        - $ref: './base-components.yaml#/components/schemas/PersonPiiFields'