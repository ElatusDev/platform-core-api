openapi: 3.0.3
info:
  title: Collaborator API
  description: API for managing collaborators with internal authentication
  version: 1.0.0

paths:
  /collaborators:
    get:
      tags:
        - Collaborators
      summary: List all collaborators
      operationId: getAllCollaborators
      parameters:
        - $ref: './commons.yaml#/components/parameters/PageParam'
        - $ref: './commons.yaml#/components/parameters/SizeParam'
        - name: skills
          in: query
          description: Filter by skills (partial match)
          schema:
            type: string
            maxLength: 100
        - name: entryDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: entryDateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './base-components.yaml#/components/schemas/GetAllCollaboratorResponse'
                  pagination:
                    $ref: './commons.yaml#/components/schemas/PaginationInfo'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'

    post:
      tags:
        - Collaborators
      summary: Create new collaborator
      operationId: createCollaborator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollaboratorCreationRequest'
      responses:
        '201':
          description: Collaborator created successfully
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/CollaboratorCreationResponse'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '409':
          $ref: './commons.yaml#/components/responses/Conflict'

  /collaborators/{collaboratorId}:
    get:
      tags:
        - Collaborators
      summary: Get collaborator by ID
      operationId: getCollaborator
      parameters:
        - name: collaboratorId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/GetCollaboratorResponse'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

    put:
      tags:
        - Collaborators
      summary: Update collaborator
      operationId: updateCollaborator
      parameters:
        - name: collaboratorId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollaboratorUpdateRequest'
      responses:
        '200':
          description: Collaborator updated successfully
          content:
            application/json:
              schema:
                $ref: './base-components.yaml#/components/schemas/CollaboratorUpdateResponse'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

    delete:
      tags:
        - Collaborators
      summary: Soft delete collaborator
      operationId: deleteCollaborator
      parameters:
        - name: collaboratorId
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Collaborator deleted successfully
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './commons.yaml#/components/responses/NotFound'

  /collaborators/by-skills:
    get:
      tags:
        - Collaborators
      summary: Find collaborators by skills
      operationId: findCollaboratorsBySkills
      parameters:
        - name: skills
          in: query
          required: true
          description: Comma-separated list of skills
          schema:
            type: string
            example: "math,physics,english"
        - $ref: './commons.yaml#/components/parameters/PageParam'
        - $ref: './commons.yaml#/components/parameters/SizeParam'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: './base-components.yaml#/components/schemas/GetAllCollaboratorResponse'
                  pagination:
                    $ref: './commons.yaml#/components/schemas/PaginationInfo'
        '400':
          $ref: './commons.yaml#/components/responses/BadRequest'
        '401':
          $ref: './commons.yaml#/components/responses/Unauthorized'

components:
  schemas:
    CollaboratorCreationRequest:
      allOf:
        - $ref: './base-components.yaml#/components/schemas/CollaboratorBaseFields'
        - $ref: './base-components.yaml#/components/schemas/PersonPiiFields'
        - $ref: './base-components.yaml#/components/schemas/InternalAuthFields'
      required:
        - skills
        - birthdate
        - entryDate
        - username
        - password
        - role
        - firstName
        - lastName
        - email
        - phoneNumber
        - address
        - zipCode

    CollaboratorUpdateRequest:
      allOf:
        - $ref: './base-components.yaml#/components/schemas/CollaboratorBaseFields'
        - $ref: './base-components.yaml#/components/schemas/PersonPiiFields'
        - type: object
          properties:
            role:
              type: string
              maxLength: 500