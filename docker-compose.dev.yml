networks:
  akademia-internal:
    driver: bridge
    internal: true
  akademia-external:
    driver: bridge

services:
  ca-service:
    build:
      context: .
      dockerfile: certificate-authority/Dockerfile
    container_name: ca-service
    # NO host ports — CA is internal-only and unreachable from outside Docker
    networks:
      - akademia-internal
    volumes:
      - ca_certs:/certs
    environment:
      SPRING_PROFILES_ACTIVE: ca-service
      CA_KEYSTORE_PASS: ${KEYSTORE_PASS}
    secrets:
      - ca_bootstrap_tokens
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8082/ca/ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  platform-core-api:
    image: elatusdevops/akademiaplus-platform-core-api:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-core-api
    depends_on:
      ca-service:
        condition: service_healthy
      multi_tenant_db:
        condition: service_healthy
      platform-core-redis:
        condition: service_healthy
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "8443:8443"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CA_ENROLL_URL: https://ca-service:8082
      CA_MTLS_URL: https://ca-service:8081
      # Override host-local paths → container paths (entrypoint generates keystore here)
      KEYSTORE_PATH: /app/certs/keystore.p12
      STORE_ALIAS: ${KEY_ALIAS}
    volumes:
      - app_certs:/app/certs
    secrets:
      - platform_core_bootstrap_token
    entrypoint: ["/app/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8443/api/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 60s

  mock-data-system:
    build:
      context: .
      dockerfile: mock-data-system/Dockerfile
    container_name: mock-data-system
    depends_on:
      platform-core-api:
        condition: service_healthy
    networks:
      - akademia-internal
    ports:
      - "8180:8180"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: mock-data-service
      SPRING_DATASOURCE_URL: jdbc:mariadb://multi_tenant_db:3306/${DATABASE}
      # Override host-local KEYSTORE_PATH → shared volume created by platform-core-api entrypoint
      KEYSTORE_PATH: /app/certs/keystore.p12
      STORE_ALIAS: ${KEY_ALIAS}
    volumes:
      - app_certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8180/infra/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  multi_tenant_db:
    image: mariadb:latest
    container_name: multi_tenant_db
    restart: always
    depends_on:
      ca-service:
        condition: service_healthy
    networks:
      - akademia-internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: multi_tenant_db
      MYSQL_USER: dev
      MYSQL_PASSWORD: 12345
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d
    command: >
      --general-log=1
      --general-log-file=/var/lib/mysql/mariadb-general.log
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/mariadb-slow.log
      --long-query-time=2

  platform-core-redis:
    image: redis:6-alpine
    container_name: platform-core-redis
    restart: always
    depends_on:
      multi_tenant_db:
        condition: service_healthy
    networks:
      - akademia-internal
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

secrets:
  ca_bootstrap_tokens:
    file: ./secrets/ca-bootstrap-tokens.json
  platform_core_bootstrap_token:
    file: ./secrets/platform-core-api-token.txt

volumes:
  db_data: {}
  redis_data: {}
  ca_certs: {}
  app_certs: {}
