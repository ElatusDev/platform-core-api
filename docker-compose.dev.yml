networks:
  akademia-internal:
    driver: bridge
    internal: true
  akademia-external:
    driver: bridge

services:
  ca-service:
    build:
      context: .
      dockerfile: certificate-authority/Dockerfile
    container_name: ca-service
    # NO host ports — CA is internal-only and unreachable from outside Docker
    networks:
      - akademia-internal
    volumes:
      - ca_certs:/certs
    environment:
      SPRING_PROFILES_ACTIVE: ca-service
      CA_KEYSTORE_PASS: ${KEYSTORE_PASS}
    secrets:
      - ca_bootstrap_tokens
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:8082/ca/ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  platform-core-api:
    image: elatusdevops/akademiaplus-platform-core-api:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-core-api
    depends_on:
      ca-service:
        condition: service_healthy
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "8443:8443"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CA_ENROLL_URL: https://ca-service:8082
      CA_MTLS_URL: https://ca-service:8081
    volumes:
      - app_certs:/app/certs
    secrets:
      - platform_core_bootstrap_token
    entrypoint: ["/app/docker-entrypoint.sh"]

  multi_tenant_db:
    image: mariadb:latest
    container_name: multi_tenant_db
    restart: always
    networks:
      - akademia-internal
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: multi_tenant_db
      MYSQL_USER: dev
      MYSQL_PASSWORD: 12345
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db_init:/docker-entrypoint-initdb.d
    command: >
      --general-log=1
      --general-log-file=/var/lib/mysql/mariadb-general.log
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/mariadb-slow.log
      --long-query-time=2

  platform-core-redis:
    image: redis:6-alpine
    container_name: platform-core-redis
    restart: always
    networks:
      - akademia-internal
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

secrets:
  ca_bootstrap_tokens:
    file: ./secrets/ca-bootstrap-tokens.json
  platform_core_bootstrap_token:
    file: ./secrets/platform-core-api-token.txt

volumes:
  db_data: {}
  redis_data: {}
  ca_certs: {}
  app_certs: {}
