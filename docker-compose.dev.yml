# =============================================================================
# docker-compose.dev.yml — AkademiaPlus local dev stack
#
# ARCHITECTURE
# ────────────
# All services communicate over plain HTTP on the isolated akademia-internal
# Docker network (internal: true — no external traffic). TLS is NOT configured
# at the application layer; it is an infrastructure concern handled by the
# orchestrator (reverse proxy for edge in Docker, cert-manager/Istio in K8s).
#
# USAGE
# ─────
# Cold start (wipe all volumes, full rebuild):
#   docker compose -f docker-compose.dev.yml down -v && \
#   docker compose -f docker-compose.dev.yml up --build
#
# Warm start (preserve volumes):
#   docker compose -f docker-compose.dev.yml up --build
#
# Rebuild API only (infra already healthy):
#   docker compose -f docker-compose.dev.yml up --build platform-core-api
#
# Infra only (for IDE / local profile debugging):
#   docker compose -f docker-compose.dev.yml up \
#     trust-broker multi_tenant_db platform-core-redis
#
# Tail all logs:
#   docker compose -f docker-compose.dev.yml logs -f
#
# STARTUP ORDER (enforced by depends_on + healthchecks)
# ──────────────────────────────────────────────────────
#   trust-broker + multi_tenant_db + platform-core-redis
#     └─► platform-core-api     (HTTP on 8100, registers JWKS on startup)
#   platform-core-api
#     └─► mock-data-service       (HTTP on 8110, seeds database)
#
# webapp-service lives in AkademiaPlusWebApp/docker-compose.dev.yml and
# joins these networks as external after this stack is healthy.
# =============================================================================

networks:
  akademia-internal:
    driver: bridge
    internal: true
  akademia-external:
    driver: bridge

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Trust Broker — JWT JWKS registry (HTTP on 8102)
  # Internal-only: no host port exposure. Services register JWT public keys
  # on startup; JWKS document is served for token verification.
  # ─────────────────────────────────────────────────────────────────────────
  trust-broker:
    build:
      context: .
      dockerfile: certificate-authority/Dockerfile
    container_name: trust-broker
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "8102:8082"
    volumes:
      - trust_broker_data:/certs
    environment:
      SPRING_PROFILES_ACTIVE: ca-service
      CA_KEYSTORE_PASS: ${KEYSTORE_PASS}
      CA_CERT_PATH: /certs
    secrets:
      - ca_bootstrap_tokens
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/ca/ca.crt > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # MariaDB — multi-tenant database
  # ─────────────────────────────────────────────────────────────────────────
  multi_tenant_db:
    image: mariadb:latest
    container_name: multi_tenant_db
    restart: always
    networks:
      - akademia-internal
      - akademia-external
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: multi_tenant_db
      MYSQL_USER: dev
      MYSQL_PASSWORD: 12345
    ports:
      - "3316:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db_init_dev:/docker-entrypoint-initdb.d
    command: >
      --general-log=1
      --general-log-file=/var/lib/mysql/mariadb-general.log
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/mariadb-slow.log
      --long-query-time=2

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — plain TCP (no TLS), internal network only
  # ─────────────────────────────────────────────────────────────────────────
  platform-core-redis:
    image: redis:7-alpine
    container_name: platform-core-redis
    restart: always
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "6389:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────────────
  # MongoDB — ETL staging database
  # ─────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8.0
    container_name: mongodb
    restart: always
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "27027:27017"
    environment:
      MONGO_INITDB_DATABASE: etl_staging
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─────────────────────────────────────────────────────────────────────────
  # platform-core-api — Spring Boot, HTTP on 8100
  # ─────────────────────────────────────────────────────────────────────────
  platform-core-api:
    image: elatusdevops/akademiaplus-platform-core-api:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-core-api
    depends_on:
      trust-broker:
        condition: service_healthy
      multi_tenant_db:
        condition: service_healthy
      platform-core-redis:
        condition: service_healthy
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "8100:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATA_REDIS_HOST: platform-core-redis
      SPRING_DATA_REDIS_PORT: 6379
    entrypoint: ["/app/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ─────────────────────────────────────────────────────────────────────────
  # mock-data-service — Spring Boot data seeder, HTTP on 8110
  # ─────────────────────────────────────────────────────────────────────────
  mock-data-service:
    build:
      context: .
      dockerfile: mock-data-service/Dockerfile
    container_name: mock-data-service
    depends_on:
      platform-core-api:
        condition: service_healthy
      platform-core-redis:
        condition: service_healthy
    networks:
      - akademia-internal
    ports:
      - "8110:8180"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: mock-data-service
      SPRING_DATA_REDIS_HOST: platform-core-redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATASOURCE_URL: jdbc:mariadb://multi_tenant_db:3306/${DATABASE}
    entrypoint: ["/app/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8180/infra/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s


  # ─────────────────────────────────────────────────────────────────────────
  # etl-service — ETL service, HTTP on 8120
  # ─────────────────────────────────────────────────────────────────────────
  etl-service:
    build:
      context: .
      dockerfile: etl-service/Dockerfile
    container_name: etl-service
    depends_on:
      mongodb:
        condition: service_healthy
      multi_tenant_db:
        condition: service_healthy
      platform-core-redis:
        condition: service_healthy
    networks:
      - akademia-internal
      - akademia-external
    ports:
      - "8120:8280"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: etl-service
      SPRING_DATA_REDIS_HOST: platform-core-redis
      SPRING_DATA_REDIS_PORT: 6379
      MONGODB_URI: mongodb://mongodb:27017/etl_staging
      SPRING_DATASOURCE_URL: jdbc:mariadb://multi_tenant_db:3306/${DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8280/actuator/health > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

secrets:
  ca_bootstrap_tokens:
    file: ./secrets/ca-bootstrap-tokens.json

volumes:
  redis_data: {}
  trust_broker_data: {}
  mariadb_data: {}
  mongodb_data: {}
