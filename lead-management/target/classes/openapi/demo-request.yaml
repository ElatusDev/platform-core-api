openapi: 3.0.3
info:
  title: Platform Core API - Demo Requests
  description: API for managing product demo requests from prospective customers
  version: 1.0.0

paths:
  /lead-management/demo-requests:
    post:
      tags:
        - DemoRequests
      summary: Submit a demo request
      description: Creates a new product demo request (public endpoint)
      operationId: createDemoRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DemoRequestCreationRequest'
      responses:
        '201':
          description: Demo request created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoRequestCreationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - DemoRequests
      summary: List all demo requests
      description: Retrieves all demo requests (authenticated)
      operationId: getAllDemoRequests
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllDemoRequests200Response'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /lead-management/demo-requests/{id}:
    get:
      tags:
        - DemoRequests
      summary: Get demo request by ID
      description: Retrieves a specific demo request by its ID (authenticated)
      operationId: getDemoRequestById
      parameters:
        - $ref: '#/components/parameters/DemoRequestId'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDemoRequestResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - DemoRequests
      summary: Delete a demo request
      description: Soft-deletes a demo request by its ID (authenticated)
      operationId: deleteDemoRequest
      parameters:
        - $ref: '#/components/parameters/DemoRequestId'
      responses:
        '204':
          description: Demo request deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    DemoRequestId:
      name: id
      in: path
      description: Unique identifier of the demo request
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    DemoRequestCreationRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - company_name
      properties:
        first_name:
          type: string
          maxLength: 100
        last_name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        company_name:
          type: string
          maxLength: 200
        message:
          type: string

    DemoRequestCreationResponse:
      type: object
      properties:
        demo_request_id:
          type: integer
          format: int64

    GetDemoRequestResponse:
      type: object
      properties:
        demo_request_id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        company_name:
          type: string
        message:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    GetAllDemoRequests200Response:
      type: object
      properties:
        demo_requests:
          type: array
          items:
            $ref: '#/components/schemas/GetDemoRequestResponse'

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        path:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
